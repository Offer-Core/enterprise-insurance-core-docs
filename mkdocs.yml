site_name: Enterprise Insurance Platform
site_description: Architecture and documentation for the Saudi Arabia insurance platform
site_author: Enterprise Architecture Team
site_url: https://offer-core.github.io/enterprise-insurance-core-docs/

repo_name: Offer-Core/enterprise-insurance-core-docs
repo_url: https://github.com/Offer-Core/enterprise-insurance-core-docs
edit_uri: edit/master/

copyright: Copyright &copy; 2026 Enterprise Insurance Platform

docs_dir: mkdocs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - search.highlight

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - panzoom:
      key: "none"
      always_show_hint: true


nav:
  - Home: index.md
  - Knowledge Base:
      - Vision: knowledge-base/000-Vision/index.md
      - Business: knowledge-base/100-Business/index.md
      - Architecture:
          - Overview: knowledge-base/architecture/overview.md
          - Domain Architecture: knowledge-base/architecture/domain-architecture.md
          - Data Architecture: knowledge-base/architecture/data-architecture.md
          - Data Models: knowledge-base/architecture/data-models.md
          - Integration Architecture: knowledge-base/architecture/integration-architecture.md
          - Integration Specs: knowledge-base/architecture/integration-specs.md
          - API Architecture: knowledge-base/architecture/api-architecture.md
          - Security Architecture: knowledge-base/architecture/security-architecture.md
          - Event Contracts: knowledge-base/architecture/event-contracts.md
          - UI Architecture: knowledge-base/architecture/ui-architecture.md
          - Deployment Architecture: knowledge-base/architecture/deployment-architecture.md
          - Deployment Artifacts: knowledge-base/architecture/deployment-artifacts.md
          - Operations and Observability: knowledge-base/architecture/operations-observability.md
          - Testing Strategy: knowledge-base/architecture/testing-strategy.md
          - Migration Plan: knowledge-base/architecture/migration-plan.md
          - Architecture Decisions: knowledge-base/architecture/architecture-decisions.md
          - Architecture README: knowledge-base/architecture/README.md
      - Domains:
          - Overview: knowledge-base/200-Domains/index.md
      - Standards: knowledge-base/400-Standards/index.md
      - Templates: knowledge-base/950-Templates/index.md
      - AI: knowledge-base/990-AI/index.md
