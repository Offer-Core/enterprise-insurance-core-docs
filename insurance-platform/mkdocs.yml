site_name: Enterprise Insurance Platform
site_description: Comprehensive documentation for the Enterprise Insurance Platform
site_author: Enterprise Architecture Team
site_url: https://docs.insurance-platform.example.com

repo_name: insurance-platform/docs
repo_url: https://github.com/insurance-platform/docs
edit_uri: edit/main/knowledge-base/

copyright: Copyright &copy; 2024 Enterprise Insurance Platform

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - header.autohide
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - git-revision-date-localized
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - diagrams:
      cache: true
      cache_dir: '.cache/diagrams'
      version: 'latest'
      theme: 'default'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - footnotes
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

